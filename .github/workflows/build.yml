name: Build APK Barberia
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install flet supabase serious-python
      - name: Build APK
        run: flet build apk --verbose
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: BarberApp-Release
          path: build/apk/*.apk
